<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>213 서버 이민 신청</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b0f;--bg2:#111318;--bg3:#181c24;
  --border:#242a38;--border2:#2e3650;
  --text:#c8d0e0;--text2:#6a7490;--text3:#3a4260;
  --accent:#4f8ef7;--accent2:#7aadff;
  --gold:#d4a843;--gold2:#f0c040;
  --green:#2eb87a;--red:#e04848;
  --purple:#8250d2;--purple2:#b080f0;
  --r:8px;--r2:14px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;padding:0 0 6rem}
body.lang-ja{font-family:'Noto Sans JP',sans-serif}
body.lang-zh{font-family:'Noto Sans SC',sans-serif}
.wrap{width:100%;max-width:480px;padding:0 1rem;margin:0 auto}

.lang-bar{display:flex;justify-content:center;padding:.875rem 0 0;gap:6px}
.lang-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 14px;font-size:12px;color:var(--text2);cursor:pointer;transition:.15s;font-family:inherit}
.lang-btn:hover{border-color:var(--border2);color:var(--text)}
.lang-btn.on{background:rgba(79,142,247,.15);border-color:var(--accent);color:var(--accent2);font-weight:500}

.hdr{padding:1.75rem 0 1.5rem;text-align:center;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(46,184,122,.1);border:1px solid rgba(46,184,122,.3);color:#2dd47d;font-size:11px;padding:5px 16px;border-radius:20px;margin-bottom:14px;letter-spacing:1.5px;font-weight:500;box-shadow:0 0 12px rgba(46,184,122,.15)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 1.4s infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.hdr-title{font-family:'Black Han Sans',sans-serif;font-size:32px;letter-spacing:2px;background:linear-gradient(135deg,#fff 30%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.hdr-sub{font-size:13px;color:var(--text2);margin-bottom:8px}
.hdr-credit{font-size:11px;color:var(--text3)}
.hdr-credit b{color:rgba(212,168,67,.7);font-weight:400}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem;margin-bottom:.875rem;transition:border-color .2s}
.card-uid{border-color:rgba(79,142,247,.35);background:linear-gradient(135deg,#111318,#13172280)}
.sec-label{font-size:10px;letter-spacing:2.5px;color:var(--text2);text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
.sec-num{color:var(--accent2);font-style:normal;font-weight:700;font-size:12px;letter-spacing:1px}

/* 입력 공통 */
input[type=text],select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:11px 13px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;height:44px}
input[type=text]:focus,select:focus{border-color:var(--accent)}
input::placeholder{color:var(--text3)}
select option{background:var(--bg3)}

/* 플레이어 입력 */
.player-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.field-label{font-size:11px;color:var(--text2);margin-bottom:5px;display:block}
.uid-wrap{position:relative}
.uid-inp{font-size:15px;letter-spacing:1px;border-color:rgba(79,142,247,.35)!important;padding-right:70px!important}
.uid-inp:focus{border-color:var(--accent)!important}
.uid-cnt{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--text3);pointer-events:none}
.uid-cnt.full{color:#2dd47d;font-weight:700}
.btn-confirm{width:100%;background:linear-gradient(135deg,#3d8bff,#1a5fd4);color:#fff;border:none;border-radius:var(--r);padding:14px;font-size:14px;font-family:inherit;font-weight:700;cursor:pointer;transition:.2s;margin-top:10px;box-shadow:0 4px 20px rgba(61,139,255,.4);letter-spacing:.5px}
.btn-confirm:hover{filter:brightness(1.1)}
.err-box{display:none;background:rgba(224,72,72,.08);border:1px solid rgba(224,72,72,.25);color:var(--red);font-size:12px;padding:9px 13px;border-radius:var(--r);margin-top:8px}
.err-box.on{display:block}

/* 이동방식 */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mode-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px 12px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:12px;user-select:none}
.mode-btn:hover{border-color:var(--border2)}
.mode-btn.on{background:rgba(79,142,247,.08);border-color:var(--accent)}
.mode-ico{font-size:24px;flex-shrink:0}
.mode-name{font-size:14px;font-weight:500;color:var(--text);transition:.2s}
.mode-desc{font-size:11px;color:var(--text3);margin-top:2px;transition:.2s}
.mode-btn.on .mode-name{color:var(--accent2)}
.mode-btn.on .mode-desc{color:var(--text2)}

/* 이민전투력 */
.migr-box{border:1px solid rgba(130,80,210,.35);background:rgba(130,80,210,.05);border-radius:var(--r);padding:12px 14px}
.migr-lbl{font-size:12px;color:var(--purple2);margin-bottom:6px;display:flex;align-items:center;gap:5px;font-weight:500}
.migr-lbl svg{width:13px;height:13px;stroke:var(--purple2);fill:none;flex-shrink:0}
.migr-box input{border-color:rgba(130,80,210,.3)!important}
.migr-box input:focus{border-color:var(--purple)!important}
.migr-tip{font-size:10px;color:var(--text3);margin-top:5px}

/* APC */
.apc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.apc-badge{display:inline-block;background:rgba(212,168,67,.12);border:1px solid rgba(212,168,67,.28);color:var(--gold2);font-size:10px;padding:2px 8px;border-radius:4px;margin-bottom:5px;font-weight:600}
.apc-lbl{font-size:11px;color:var(--text2);margin-bottom:5px;display:flex;align-items:center;gap:4px}
.apc-lbl svg{width:12px;height:12px;stroke:var(--gold);fill:none}

/* 활동시간 */
.time-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.time-kst{font-size:10px;color:var(--gold);font-weight:600;margin-left:4px}
.kst-note{font-size:11px;color:var(--gold);margin-bottom:8px;opacity:.85}

/* 산업 */
.ind-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
.ind-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:9px 2px;text-align:center;cursor:pointer;font-size:11px;color:var(--text2);transition:.2s;user-select:none;font-weight:500;white-space:nowrap;overflow:hidden}
.ind-btn:hover{border-color:var(--border2);color:var(--text)}
.ind-btn.on{background:rgba(79,142,247,.12);border-color:var(--accent);color:var(--accent2)}

/* 병종 */
.sq-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sq-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:16px 8px;cursor:pointer;transition:.2s;display:flex;flex-direction:column;align-items:center;gap:8px;user-select:none}
.sq-btn:hover{border-color:var(--border2)}
.sq-btn.on{background:rgba(79,142,247,.1);border-color:var(--accent)}
.sq-ico{font-size:26px}
.sq-name{font-size:13px;font-weight:500;color:var(--text2);transition:.2s}
.sq-btn.on .sq-name{color:var(--accent2)}

/* 추천인 */
.rec-tip{font-size:11px;color:var(--text3);margin-bottom:8px;line-height:1.6}

/* 스크린샷 */
.ss-tabs{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:1rem}
.ss-tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:12px;color:var(--text2);background:var(--bg3);transition:.15s;border-right:1px solid var(--border);font-family:inherit}
.ss-tab:last-child{border-right:none}
.ss-tab.on{background:rgba(79,142,247,.1);color:var(--accent2)}
.ss-pane{display:none}
.ss-pane.on{display:block;animation:fd .2s ease}
@keyframes fd{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.ss-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:22px;text-align:center;cursor:pointer;transition:.2s}
.ss-zone:hover{border-color:var(--accent)}
.ss-zone.has-file{border-style:solid;border-color:var(--green);background:rgba(46,184,122,.04)}
.ss-zone-ico{font-size:26px;display:block;margin-bottom:8px}
.ss-zone-txt{font-size:13px;color:var(--text2);margin-bottom:3px}
.ss-zone-sub{font-size:11px;color:var(--text3)}
.ss-fname{font-size:12px;color:var(--green);margin-top:6px;display:none}
.ss-fname.on{display:block}
.ss-guide{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-top:10px}
.ss-guide-hdr{font-size:11px;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.ss-guide-hdr svg{width:12px;height:12px;stroke:var(--gold2);fill:none}
.ss-step{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:11px;color:var(--text3);line-height:1.5}
.ss-step:last-child{margin-bottom:0}
.ss-step-n{width:16px;height:16px;border-radius:50%;background:rgba(79,142,247,.12);border:1px solid rgba(79,142,247,.3);color:var(--accent2);font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.btn-sample{width:100%;background:rgba(212,168,67,.07);border:1px solid rgba(212,168,67,.2);color:var(--gold);border-radius:var(--r);padding:9px;font-size:12px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px;transition:.2s}
.btn-sample:hover{background:rgba(212,168,67,.13)}
.btn-sample svg{width:13px;height:13px;stroke:currentColor;fill:none}
input[type=file]{display:none}

/* 제출 */
.btn-save{width:100%;background:linear-gradient(135deg,#1ea86a,#0d7a4d);color:#fff;border:none;border-radius:var(--r2);padding:17px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:.5rem;letter-spacing:1px;transition:.2s;box-shadow:0 6px 25px rgba(30,168,106,.4);text-shadow:0 1px 3px rgba(0,0,0,.2)}
.btn-save:hover{filter:brightness(1.1);box-shadow:0 8px 30px rgba(30,168,106,.5)}
.btn-save:active{transform:scale(.99)}

/* 완료 */
.done{display:none;text-align:center;padding:3rem 1rem}
.done.on{display:block;animation:fd .4s ease}
.done-ring{width:84px;height:84px;border-radius:50%;background:rgba(30,168,106,.15);border:3px solid #2dd47d;margin:0 auto 1.5rem;display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(30,168,106,.25)}
.done-ring svg{width:34px;height:34px;stroke:var(--green);fill:none}
.done-title{font-family:'Black Han Sans',sans-serif;font-size:28px;margin-bottom:8px;background:linear-gradient(135deg,#fff,var(--green2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.done-sub{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:1.5rem;white-space:pre-line}
.done-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:1rem 1.25rem;text-align:left;margin-bottom:1rem}
.done-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:7px 0;border-bottom:1px solid var(--border)}
.done-row:last-child{border-bottom:none}
.done-row span:first-child{color:var(--text2);flex-shrink:0;margin-right:12px}
.done-row span:last-child{color:var(--text);font-weight:500;text-align:right;word-break:break-all}

/* 관리패널 */
.admin-toggle{width:100%;background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border2);border-radius:var(--r2);padding:13px 18px;font-size:13px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;margin-top:1.5rem;transition:.2s;font-family:inherit}
.admin-toggle:hover{border-color:var(--border2);color:var(--text)}
.admin-panel{display:none;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem;margin-top:.5rem}
.admin-panel.on{display:block}
.admin-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem;gap:8px;flex-wrap:wrap}
.admin-stat{font-size:12px;color:var(--text2)}
.admin-stat strong{color:var(--accent2)}
.btn-xls{background:rgba(46,184,122,.1);border:1px solid rgba(46,184,122,.28);color:var(--green);border-radius:var(--r);padding:7px 13px;font-size:12px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:5px;transition:.2s}
.btn-xls:hover{background:rgba(46,184,122,.2)}
.btn-xls svg{width:13px;height:13px;stroke:currentColor;fill:none}
.admin-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border)}
.admin-tbl{width:100%;border-collapse:collapse;font-size:12px;min-width:680px}
.admin-tbl th{background:var(--bg3);color:var(--text2);padding:9px 10px;text-align:left;border-bottom:1px solid var(--border);font-weight:500;font-size:10px;letter-spacing:.8px;text-transform:uppercase;white-space:nowrap}
.admin-tbl td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap}
.admin-tbl tr:last-child td{border-bottom:none}
.admin-tbl tr:hover td{background:rgba(255,255,255,.02)}
.tag-p{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500;background:rgba(79,142,247,.12);color:var(--accent2);border:1px solid rgba(79,142,247,.28)}
.empty-msg{text-align:center;color:var(--text3);font-size:13px;padding:2rem 0}

/* 비번모달 */
.pw-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:2000;align-items:center;justify-content:center;padding:1rem}
.pw-bg.on{display:flex}
.pw-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);padding:1.5rem;width:100%;max-width:300px;text-align:center}
.pw-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:5px}
.pw-sub{font-size:12px;color:var(--text2);margin-bottom:1rem}
.pw-inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:11px;font-size:16px;text-align:center;letter-spacing:4px;font-family:inherit;outline:none;transition:.2s;margin-bottom:8px}
.pw-inp:focus{border-color:var(--accent)}
.pw-err{font-size:12px;color:var(--red);margin-bottom:8px;display:none}
.pw-err.on{display:block}
.pw-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:12px;font-size:14px;font-family:inherit;font-weight:500;cursor:pointer}
.pw-cancel{background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;margin-top:8px;width:100%;font-family:inherit;display:block}

/* 샘플모달 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:3000;align-items:center;justify-content:center;padding:1rem}
.modal-bg.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r2);max-width:360px;width:100%;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.modal-hdr{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-hdr span{font-size:14px;font-weight:500;color:var(--text)}
.modal-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;line-height:1}
.modal-body{padding:16px;overflow-y:auto}
.modal-body img{width:100%;border-radius:var(--r);border:1px solid var(--border)}
.modal-cap{font-size:11px;color:var(--text2);margin-top:10px;line-height:1.6;padding:10px;background:var(--bg3);border-radius:var(--r)}
</style>
</head>
<body class="lang-ko">
<div class="wrap">

  <div class="lang-bar">
    <button class="lang-btn on" onclick="setLang('ko')">한국어</button>
    <button class="lang-btn" onclick="setLang('en')">English</button>
    <button class="lang-btn" onclick="setLang('ja')">日本語</button>
    <button class="lang-btn" onclick="setLang('zh')">中文</button>
  </div>

  <div class="hdr">
    <div class="live-badge"><span class="live-dot"></span><span id="t-live"></span></div>
    <div class="hdr-title" id="t-main-title">213 이민 신청</div>
    <div class="hdr-sub" id="t-sub"></div>
    <div class="hdr-credit">Designed by <b>213NXT 부앙(Bu-ang)</b></div>
  </div>

  <!-- 01 플레이어 정보 -->
  <div class="card card-uid">
    <div class="sec-label"><span class="sec-num">01</span> <span id="t-sec1"></span></div>
    <div class="player-grid">
      <div>
        <label class="field-label" id="t-lbl-nick"></label>
        <input type="text" id="inp-name">
      </div>
      <div>
        <label class="field-label" id="t-lbl-server"></label>
        <input type="text" id="inp-server" maxlength="6">
      </div>
    </div>
    <label class="field-label" id="t-lbl-uid"></label>
    <div class="uid-wrap">
      <input type="text" id="inp-uid" class="uid-inp" maxlength="16" inputmode="numeric" oninput="onUID(this)">
      <span class="uid-cnt" id="uid-cnt">0/16</span>
    </div>
    <div id="t-uid-warn" style="display:flex;align-items:flex-start;gap:6px;background:rgba(214,48,48,.07);border:1px solid rgba(214,48,48,.2);border-radius:var(--r);padding:9px 12px;margin-top:6px;font-size:11px;color:#ff8080;line-height:1.5"></div>
    <div class="err-box" id="inp-err"></div>
    <button class="btn-confirm" id="t-confirm" onclick="confirmPlayer()"></button>
  </div>

  <!-- 02~09: UID 확인 후 표시 -->
  <div id="form-body" style="display:none">

    <!-- 02 이동방식 -->
    <div class="card">
      <div class="sec-label"><span class="sec-num">02</span> <span id="t-sec2"></span></div>
      <div class="mode-grid">
        <div class="mode-btn on" data-mode="혼자" onclick="selMode(this)">
          <div class="mode-ico">🧍</div>
          <div><div class="mode-name" id="t-alone"></div><div class="mode-desc" id="t-aloneD"></div></div>
        </div>
        <div class="mode-btn" data-mode="연맹" onclick="selMode(this)">
          <div class="mode-ico">👥</div>
          <div><div class="mode-name" id="t-group"></div><div class="mode-desc" id="t-groupD"></div></div>
        </div>
      </div>
    </div>

    <!-- 03 이민전투력 -->
    <div class="card">
      <div class="sec-label"><span class="sec-num">03</span> <span id="t-sec3"></span></div>
      <div class="migr-box">
        <div class="migr-lbl">
          <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          <span id="t-migr-lbl"></span>
        </div>
        <input type="text" id="cp-migr" inputmode="decimal" placeholder="예: 182.4" oninput="showUnit()">
        <div class="migr-tip" id="t-migr-tip"></div>
      </div>
    </div>

    <!-- 04 APC 편대 -->
    <div class="card">
      <div class="sec-label"><span class="sec-num">04</span> <span id="t-sec4"></span></div>
      <div class="apc-grid">
        <div>
          <div class="apc-badge" id="t-apc1b"></div>
          <div class="apc-lbl"><svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="8" width="16" height="9" rx="2"/><circle cx="6" cy="19" r="2"/><circle cx="14" cy="19" r="2"/><path d="M18 11h2a2 2 0 0 1 2 2v2h-4"/><path d="M8 8V6a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg><span id="t-apc-cp"></span></div>
          <input type="text" id="apc1" placeholder="예: 5.52G">
        </div>

let lang='ko', pData=null, selModeVal='혼자', selIndVal=null, selSqVal='파이터';
const getDB=()=>{try{return JSON.parse(localStorage.getItem('dw213')||'[]')}catch{return[]}};
const saveDB=d=>localStorage.setItem('dw213',JSON.stringify(d));
const fmtN=n=>n?Number(n).toLocaleString('ko-KR'):'0';

// ═══════════ 언어 전환 ═══════════
function setLang(l){
  lang=l;
  document.body.className='lang-'+l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('on'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('on');
  const t=TX[l];
  // id와 번역키가 완전히 1:1 — 모든 span/div/button 텍스트 업데이트
  const uw=document.getElementById('t-uid-warn');if(uw&&t['t-uid-warn'])uw.textContent=t['t-uid-warn'];
  Object.keys(t).forEach(id=>{
    if(id.startsWith('ERR_')||id.startsWith('F_')||id.startsWith('ADM_')||
       id==='NO_DATA'||id==='EMPTY'||id==='IND_PX'||
       id.startsWith('CP_')||id.startsWith('APC_')) return;
    const el=document.getElementById(id);
    if(!el) return;
    if(el.tagName==='INPUT'||el.tagName==='TEXTAREA') el.placeholder=t[id];
    else el.textContent=t[id];
  });
  buildInd();
}

// ═══════════ 산업 버튼 ═══════════
function buildInd(){
  const g=document.getElementById('ind-grid');
  const px=TX[lang]['IND_PX']||'산업 ';
  g.innerHTML='';
  for(let i=1;i<=12;i++){
    const d=document.createElement('div');
    d.className='ind-btn'+(selIndVal===i?' on':'');
    d.dataset.ind=i; d.textContent=px+i;
    d.onclick=function(){
      document.querySelectorAll('.ind-btn').forEach(b=>b.classList.remove('on'));
      this.classList.add('on'); selIndVal=parseInt(this.dataset.ind);
    };
    g.appendChild(d);
  }
}

// ═══════════ UID 카운터 ═══════════
function onUID(inp){
  inp.value=inp.value.replace(/\D/g,'');
  const n=inp.value.length;
  const c=document.getElementById('uid-cnt');
  c.textContent=n+'/16'; c.className='uid-cnt'+(n===16?' full':'');
}

// ═══════════ 플레이어 확인 ═══════════
function confirmPlayer(){
  const t=TX[lang];
  const name=document.getElementById('inp-name').value.trim();
  const srv=document.getElementById('inp-server').value.trim();
  const uid=document.getElementById('inp-uid').value.trim();
  const err=document.getElementById('inp-err');
  err.classList.remove('on');
  if(!name){err.textContent=t.ERR_NAME;err.classList.add('on');return;}
  if(!srv){err.textContent=t.ERR_SERVER;err.classList.add('on');return;}
  if(uid.length!==16){err.textContent=t.ERR_UID;err.classList.add('on');return;}
  if(!/^\d+$/.test(uid)){err.textContent=t.ERR_NUM;err.classList.add('on');return;}
  pData={name,sid:srv,uid};
  document.getElementById('form-body').style.display='block';
  document.getElementById('form-body').scrollIntoView({behavior:'smooth',block:'start'});
}
document.getElementById('inp-uid').addEventListener('keydown',e=>{if(e.key==='Enter')confirmPlayer();});

// ═══════════ 선택 함수 ═══════════
function selMode(el){document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('on'));el.classList.add('on');selModeVal=el.dataset.mode;}
function selSq(el){document.querySelectorAll('.sq-btn').forEach(b=>b.classList.remove('on'));el.classList.add('on');selSqVal=el.dataset.sq;}

// ═══════════ 이민전투력 단위 표시 ═══════════
function showUnit(){
  const val = document.getElementById('cp-migr').value.trim();
  const el  = document.getElementById('migr-unit');
  if(!val||isNaN(val)){el.textContent='';return;}
  const n = parseFloat(val);
  if(n>0) el.textContent = '= '+n.toFixed(1)+'M';
  else    el.textContent = '';
}

// ═══════════ 쉼표 포맷 ═══════════
function fmtCP(inp){
  const raw=inp.value.replace(/,/g,'');
  if(raw===''||isNaN(raw)){if(raw!==''&&isNaN(raw))inp.value=raw.slice(0,-1);return;}
  inp.value=parseInt(raw).toLocaleString('ko-KR');
}
const getRaw=id=>parseInt((document.getElementById(id)?.value||'0').replace(/,/g,''))||0;

// ═══════════ 스크린샷 ═══════════
function ssTab(i,el){
  document.querySelectorAll('.ss-tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.ss-pane').forEach(p=>p.classList.remove('on'));
  el.classList.add('on'); document.getElementById('ss-pane-'+i).classList.add('on');
}
function handleFile(inp,type){
  if(!inp.files[0])return;
  document.getElementById(type+'-zone').classList.add('has-file');
  document.getElementById(type+'-ico').textContent='✅';
  const fn=document.getElementById(type+'-fn');
  fn.textContent='✓ '+inp.files[0].name; fn.classList.add('on');
}

function openModal(type){
  const t=TX[lang];
  document.getElementById('modal-img').src=SAMPLE_IMGS[type];
  document.getElementById('modal-title').textContent=type==='cp'?t.CP_MODAL_TITLE:t.APC_MODAL_TITLE;
  document.getElementById('modal-cap').textContent=type==='cp'?t.CP_MODAL_CAP:t.APC_MODAL_CAP;

}

function openPW(){
  const p=document.getElementById('admin-panel');
  if(p.classList.contains('on')){p.classList.remove('on');return;}
  document.getElementById('pw-inp').value='';
  document.getElementById('pw-err').classList.remove('on');
  document.getElementById('pw-bg').classList.add('on');
  setTimeout(()=>document.getElementById('pw-inp').focus(),100);
}
function closePW(){document.getElementById('pw-bg').classList.remove('on');}
function checkPW(){
  if(document.getElementById('pw-inp').value===ADMIN_PW){
    closePW(); document.getElementById('admin-panel').classList.add('on'); renderAdmin();
  }else{
    document.getElementById('pw-err').textContent=TX[lang].ERR_PW;
    document.getElementById('pw-err').classList.add('on');
    document.getElementById('pw-inp').value=''; document.getElementById('pw-inp').focus();
  }
}
document.getElementById('pw-inp').addEventListener('keydown',e=>{if(e.key==='Enter')checkPW();if(e.key==='Escape')closePW();});

// ═══════════ 자동 등급 (관리자 페이지용) ═══════════
const GRADES=JSON.parse(localStorage.getItem('grade_ranges213')||'null')||
  {일반:{min:0,max:149},중급:{min:150,max:299},고급:{min:300,max:499},특급:{min:500,max:999}};
function autoGrade(cpMigr){
  const v=Number(cpMigr)/1000000; // M 단위로 변환
  for(const t of['일반','중급','고급','특급']){
    if(v>=(GRADES[t]?.min??0)&&v<=(GRADES[t]?.max??999))return t;
  }
  return '모름';
}

function save(){
  const t=TX[lang];
  if(!pData){alert(t.ERR_NAME);return;}
  if(!getRaw('cp-migr')){alert(t.ERR_MIGR);return;}
  if(!selIndVal){alert(t.ERR_IND);return;}
  const rec=document.getElementById('recommender').value.trim();
  if(!rec){alert(t.ERR_REC);return;}

  const entry={
    id:Date.now(), registeredAt:new Date().toLocaleString('ko-KR'),
    name:pData.name, uid:pData.uid, fromSid:pData.sid,
    mode:selModeVal,
    cpMigr:(()=>{const v=parseFloat(document.getElementById('cp-migr').value)||0;return Math.round(v*1000000);})(),
    killScore:getRaw('inp-kill'),
    blackMoney:getRaw('inp-bm'),
    killScore:getRaw('inp-kill'),
    blackMoney:getRaw('inp-bm'),
    apc1:document.getElementById('apc1').value.trim()||'-',
    apc2:document.getElementById('apc2').value.trim()||'-',
    apc3:document.getElementById('apc3').value.trim()||'-',
    activeTime:document.getElementById('time-from').value+' ~ '+document.getElementById('time-to').value,
    industry:selIndVal, squad:selSqVal, recommender:rec, status:'검토중'
  };
  const db=getDB(); db.push(entry); saveDB(db);
  if(SHEET_URL){
    fetch(SHEET_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(entry)}).catch(()=>{});
  }

  const f=t; const px=TX[lang]['IND_PX']||'산업 ';
  document.getElementById('done-info').innerHTML=`
    <div class="done-row"><span>${f.F_NICK}</span><span>${entry.name}</span></div>
    <div class="done-row"><span>${f.F_UID}</span><span>${entry.uid}</span></div>
    <div class="done-row"><span>${f.F_FROM}</span><span>#${entry.fromSid} → #213</span></div>
    <div class="done-row"><span>${f.F_MODE}</span><span>${entry.mode}</span></div>
    <div class="done-row"><span>${f.F_KILL||'킬수'}</span><span>${fmtN(entry.killScore)}</span></div>
    <div class="done-row"><span>${f.F_BM||'블랙머니'}</span><span>${entry.blackMoney?fmtN(entry.blackMoney):'미입력'}</span></div>
    <div class="done-row"><span>${f.F_MIGR}</span><span>${parseFloat(document.getElementById('cp-migr').value||'0').toFixed(1)}M</span></div>
    <div class="done-row"><span>${f.F_APC1}</span><span>${entry.apc1||'-'}</span></div>
    <div class="done-row"><span>${f.F_APC2}</span><span>${entry.apc2||'-'}</span></div>
    <div class="done-row"><span>${f.F_APC3}</span><span>${entry.apc3||'-'}</span></div>
    <div class="done-row"><span>${f.F_TIME}</span><span>${entry.activeTime}</span></div>
    <div class="done-row"><span>${f.F_IND}</span><span>${px}${entry.industry}</span></div>
    <div class="done-row"><span>${f.F_SQ}</span><span>${entry.squad}</span></div>
    <div class="done-row"><span>${f.F_REC}</span><span>${entry.recommender}</span></div>
  `;
  document.getElementById('form-body').style.display='none';
  document.getElementById('done-screen').classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}

  const el=document.getElementById('admin-list');
  if(!db.length){el.innerHTML=`<div class="empty-msg">${t.EMPTY}</div>`;return;}
  const px=TX[lang]['IND_PX']||'산업 ';
  el.innerHTML=`<div class="admin-wrap"><table class="admin-tbl">
    <thead><tr>${t.ADM_HDR.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${db.map(r=>`<tr>
      <td><strong>${r.name}</strong></td>
      <td style="font-size:10px;color:var(--text3);font-family:monospace">${r.uid||'-'}</td>
      <td><span style="background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.25);color:var(--gold);font-size:11px;padding:2px 7px;border-radius:4px">#${r.fromSid||'-'}</span></td>

      <td style="color:var(--gold2)">${r.apc2||'-'}</td>
      <td style="color:var(--gold2)">${r.apc3||'-'}</td>
      <td style="color:var(--accent2);font-size:11px">${r.activeTime||'-'}</td>
      <td style="color:var(--text2)">${px}${r.industry||'-'}</td>
      <td>${r.squad||'-'}</td>
      <td style="color:var(--text2)">${r.recommender||'-'}</td>
      <td><span class="tag-p">${r.status||'검토중'}</span></td>

    </tbody></table></div>`;
}

function exportExcel(){
  const db=getDB(); const t=TX[lang];
  if(!db.length){alert(t.NO_DATA);return;}
  const px=TX[lang]['IND_PX']||'산업 ';
  const rows=db.map((r,i)=>({
    'No':i+1,[t.F_NICK]:r.name,'UID':r.uid||'',[t.F_FROM]:'#'+(r.fromSid||''),
    [t.F_MODE]:r.mode||'',[t.F_MIGR]:Number(r.cpMigr)||0,
    '자동등급':r.cpMigr?autoGrade(r.cpMigr):'-',
    [t.F_APC1]:Number(r.apc1)||0,[t.F_APC2]:Number(r.apc2)||0,[t.F_APC3]:Number(r.apc3)||0,
    [t.F_TIME]:r.activeTime||'',[t.F_IND]:px+(r.industry||''),
    [t.F_SQ]:r.squad||'',[t.F_REC]:r.recommender||'',
    '상태':r.status||'','신청시각':r.registeredAt||''
  }));
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[4,14,18,7,8,12,8,12,12,12,12,8,8,12,6,17].map(w=>({wch:w}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'213 Migration');
  XLSX.writeFile(wb,'213_migration_'+new Date().toISOString().slice(0,10)+'.xlsx');
}
